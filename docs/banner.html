<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 500px at 78% -10%, rgba(29,155,240,0.18), transparent 60%),
      linear-gradient(135deg, #0b0d10 0%, #14181e 100%);
    color: #fff;
    overflow: hidden;
  }
  .wrap {
    width: 1280px; height: 640px;
    display: flex; align-items: center; gap: 56px;
    padding: 0 96px;
    position: relative;
  }
  /* delikatny watermark "markdown" w tle */
  .wm {
    position: absolute; right: 60px; bottom: 40px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 130px; font-weight: 700; line-height: 1;
    color: rgba(255,255,255,0.035); letter-spacing: -6px;
    user-select: none; transform: rotate(-8deg);
  }
  .tile {
    flex: 0 0 auto;
    width: 224px; height: 224px;
    border-radius: 50px;
    background: #000;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08),
                0 30px 80px rgba(29,155,240,0.30),
                0 12px 30px rgba(0,0,0,0.5);
    display: grid; place-items: center;
  }
  .tile svg { width: 224px; height: 224px; }
  .copy {
    position: absolute;
    right: -14px; bottom: -14px;
    width: 78px; height: 78px;
    border-radius: 22px;
    background: #1d9bf0;
    box-shadow: 0 8px 20px rgba(29,155,240,0.5), 0 0 0 5px #14181e;
    display: grid; place-items: center;
  }
  .tilewrap { position: relative; }
  .copy svg { width: 40px; height: 40px; }

  .text { display: flex; flex-direction: column; }
  h1 { font-size: 82px; font-weight: 800; letter-spacing: -2px; line-height: 1.0; }
  .tag { margin-top: 18px; font-size: 30px; font-weight: 500; color: #9aa7b2; line-height: 1.3; max-width: 660px; }
  .tag b { color: #fff; font-weight: 700; }
  .chips { margin-top: 34px; display: flex; gap: 12px; flex-wrap: wrap; }
  .chip {
    font-size: 19px; font-weight: 600;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #cdd5dc;
  }
  .chip.blue { background: rgba(29,155,240,0.16); border-color: rgba(29,155,240,0.5); color: #8ed0fb; }
  .repo {
    position: absolute; left: 96px; bottom: 38px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 20px; color: rgba(255,255,255,0.34);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="wm"># ## &gt; **md**</div>

    <div class="tilewrap">
      <div class="tile">
        <svg viewBox="0 0 100 100">
          <g stroke="#fff" stroke-width="13" stroke-linecap="butt">
            <line x1="30" y1="28" x2="70" y2="72" />
            <line x1="70" y1="28" x2="30" y2="72" />
          </g>
        </svg>
      </div>
      <div class="copy">
        <!-- ikona "kopiuj" -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="11" height="11" rx="2.5" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      </div>
    </div>

    <div class="text">
      <h1>X Article Copy</h1>
      <div class="tag">Copy any <b>X (Twitter)</b> article or post as <b>clean Markdown</b> — straight from your logged-in browser.</div>
      <div class="chips">
        <span class="chip blue">📋 Copy &middot; 💾 Save .md</span>
        <span class="chip">Manifest V3</span>
        <span class="chip">Zero dependencies</span>
        <span class="chip">No tracking</span>
      </div>
    </div>

    <div class="repo">github.com/outof-place/x-article-copy</div>
  </div>
</body>
</html>
